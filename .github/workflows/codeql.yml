# CodeQL Security Analysis Workflow
# EN: Analyzes code for security vulnerabilities using GitHub CodeQL
# ES: Analiza el codigo en busca de vulnerabilidades de seguridad usando GitHub CodeQL
# PT: Analisa o codigo em busca de vulnerabilidades de seguranca usando o GitHub CodeQL

name: "CodeQL Security Analysis"

on:
  push:
      branches: [ "main" ]
        pull_request:
            branches: [ "main" ]
              schedule:
                  # EN: Runs every Monday at 6:00 AM UTC
                      # ES: Se ejecuta cada lunes a las 6:00 AM UTC
                          # PT: Executa toda segunda-feira as 6:00 AM UTC
                              - cron: '0 6 * * 1'

                              jobs:
                                analyze:
                                    name: Analyze
                                        runs-on: ubuntu-latest
                                            permissions:
                                                  actions: read
                                                        contents: read
                                                              security-events: write

                                                                  strategy:
                                                                        fail-fast: false
                                                                              matrix:
                                                                                      # EN: Add languages to analyze (javascript includes TypeScript)
                                                                                              # ES: Agrega idiomas de programacion a analizar (javascript incluye TypeScript)
                                                                                                      # PT: Adicione linguagens de programacao para analisar (javascript inclui TypeScript)
                                                                                                              language: [ 'javascript' ]
                                                                                                              
                                                                                                                  steps:
                                                                                                                      - name: Checkout repository
                                                                                                                            uses: actions/checkout@v4
                                                                                                                            
                                                                                                                                # EN: Initialize CodeQL tools for scanning
                                                                                                                                    # ES: Inicializa las herramientas CodeQL para el escaneo
                                                                                                                                        # PT: Inicializa as ferramentas CodeQL para a verificacao
                                                                                                                                            - name: Initialize CodeQL
                                                                                                                                                  uses: github/codeql-action/init@v3
                                                                                                                                                        with:
                                                                                                                                                                languages: ${{ matrix.language }}
                                                                                                                                                                        queries: security-extended,security-and-quality
                                                                                                                                                                        
                                                                                                                                                                            # EN: Auto-build attempts to build code (for compiled languages)
                                                                                                                                                                                # ES: Auto-build intenta compilar el codigo (para lenguajes compilados)
                                                                                                                                                                                    # PT: Auto-build tenta compilar o codigo (para linguagens compiladas)
                                                                                                                                                                                        - name: Autobuild
                                                                                                                                                                                              uses: github/codeql-action/autobuild@v3
                                                                                                                                                                                              
                                                                                                                                                                                                  # EN: Perform CodeQL analysis and upload results to GitHub Security
                                                                                                                                                                                                      # ES: Realiza el analisis CodeQL y sube los resultados a GitHub Security
                                                                                                                                                                                                          # PT: Realiza a analise CodeQL e envia os resultados para o GitHub Security
                                                                                                                                                                                                              - name: Perform CodeQL Analysis
                                                                                                                                                                                                                    uses: github/codeql-action/analyze@v3
                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                  category: "/language:${{matrix.language}}"
