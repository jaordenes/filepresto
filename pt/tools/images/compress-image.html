<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comprimir Imagem Online Grátis – FilePresto</title>
<meta name="description" content="Comprima imagens online gratuitamente. Reduza o tamanho do arquivo mantendo a qualidade.">
<link rel="alternate" hreflang="en" href="https://jaordenes.github.io/filepresto/tools/images/compress-image.html">
<link rel="alternate" hreflang="es" href="https://jaordenes.github.io/filepresto/es/tools/images/compress-image.html">
<link rel="alternate" hreflang="pt" href="https://jaordenes.github.io/filepresto/pt/tools/images/compress-image.html">
<link rel="alternate" hreflang="x-default" href="https://jaordenes.github.io/filepresto/tools/images/compress-image.html">
<style>
:root{--primary:#2563EB;--primary-light:#EFF6FF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:1.5rem;font-weight:700;color:var(--primary);text-decoration:none}
nav a{margin-left:1.5rem;color:#64748b;text-decoration:none;font-size:.95rem}
.lang-switcher{display:flex;gap:.5rem;margin-left:2rem}
.lang-switcher a{padding:.25rem .6rem;border-radius:.375rem;font-size:.8rem;font-weight:600;text-decoration:none;color:#64748b;border:1px solid #e2e8f0}
.lang-switcher a.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.hero{background:linear-gradient(135deg,#1e40af,var(--primary));color:#fff;padding:3rem 2rem;text-align:center}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:.5rem}
.hero p{opacity:.9;font-size:1rem;max-width:500px;margin:0 auto}
.tool-container{max-width:700px;margin:2.5rem auto;padding:0 1.5rem}
.drop-zone{border:2px dashed #cbd5e1;border-radius:1rem;padding:3rem 2rem;text-align:center;background:#fff;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.drop-zone .icon{font-size:3rem;margin-bottom:1rem}
.drop-zone h3{font-size:1.1rem;font-weight:600;color:#334155;margin-bottom:.5rem}
.drop-zone p{color:#94a3b8;font-size:.875rem}
#fileInput{display:none}
.controls{background:#fff;border-radius:1rem;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-top:1.5rem;display:none}
.file-info{background:var(--primary-light);border-radius:.5rem;padding:.75rem 1rem;margin:.75rem 0;font-size:.875rem;color:#1e40af}
.quality-row{margin:1rem 0}
.quality-row label{font-size:.875rem;font-weight:600;color:#475569;display:block;margin-bottom:.5rem}
input[type=range]{width:100%;accent-color:var(--primary)}
.quality-value{text-align:right;font-size:.875rem;color:#2563EB;font-weight:700}
.btn{background:var(--primary);color:#fff;border:none;padding:.875rem 2rem;border-radius:.5rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%;margin-top:.5rem;transition:.2s}
#download-btn{display:none;background:#16A34A;color:#fff;border:none;padding:.875rem 2rem;border-radius:.5rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%;margin-top:1rem}
.result-info{background:#DCFCE7;border-radius:.5rem;padding:.75rem 1rem;margin:.75rem 0;font-size:.875rem;color:#166534;display:none}
footer{background:#1e293b;color:#94a3b8;padding:2rem;text-align:center}
footer a{color:#94a3b8;text-decoration:none;margin:0 .75rem}
.footer-links{margin-bottom:1rem}
</style>
</head>
<body>
<header>
  <a href="../../../" class="logo">⚡ FilePresto</a>
  <nav><a href="index.html">← Imagens</a></nav>
  <div class="lang-switcher">
    <a href="../../../tools/images/compress-image.html">EN</a>
    <a href="../../../es/tools/images/compress-image.html">ES</a>
    <a href="compress-image.html" class="active">PT</a>
  </div>
</header>
<section class="hero">
  <h1>🗜️ Comprimir Imagem</h1>
  <p>Reduza o tamanho das suas imagens mantendo a qualidade visual.</p>
</section>
<div class="tool-container">
  <div class="drop-zone" id="dropZone">
    <div class="icon">🗜️</div>
    <h3>Arraste e solte sua imagem aqui</h3>
    <p>ou clique para selecionar o arquivo</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div class="controls" id="controls">
    <div class="file-info" id="fileInfo"></div>
    <div class="quality-row">
      <label>Qualidade: <span id="qualityDisplay">80</span>%</label>
      <input type="range" id="qualitySlider" min="10" max="100" value="80">
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <button class="btn" id="compressBtn">Comprimir Imagem</button>
    <div class="result-info" id="resultInfo"></div>
    <button id="download-btn">⬇️ Baixar Imagem Comprimida</button>
  </div>
</div>
<footer>
  <div class="footer-links">
    <a href="../../../pt/about.html">Sobre</a>
    <a href="../../../pt/privacy.html">Privacidade</a>
    <a href="../../../pt/terms.html">Termos</a>
  </div>
  <p>© 2025 FilePresto. Todos os direitos reservados.</p>
</footer>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),controls=document.getElementById('controls'),fileInfo=document.getElementById('fileInfo'),qualitySlider=document.getElementById('qualitySlider'),qualityDisplay=document.getElementById('qualityDisplay'),canvas=document.getElementById('canvas'),compressBtn=document.getElementById('compressBtn'),downloadBtn=document.getElementById('download-btn'),resultInfo=document.getElementById('resultInfo');
let currentFile=null;
qualitySlider.addEventListener('input',()=>qualityDisplay.textContent=qualitySlider.value);
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});
function loadFile(f){currentFile=f;fileInfo.textContent='Arquivo: '+f.name+' ('+Math.round(f.size/1024)+' KB)';controls.style.display='block';downloadBtn.style.display='none';resultInfo.style.display='none';}
compressBtn.addEventListener('click',()=>{
  if(!currentFile)return;
  const q=parseInt(qualitySlider.value)/100;
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    const dataURL=canvas.toDataURL('image/jpeg',q);
    const compressedSize=Math.round(dataURL.length*0.75);
    const savings=Math.round((1-compressedSize/currentFile.size)*100);
    resultInfo.textContent='Redução: '+savings+'% — '+Math.round(currentFile.size/1024)+' KB → '+Math.round(compressedSize/1024)+' KB';
    resultInfo.style.display='block';
    downloadBtn.style.display='block';
    downloadBtn.onclick=()=>{const a=document.createElement('a');a.download='compressed-'+currentFile.name.replace(/\.[^.]+$/,'.jpg');a.href=dataURL;a.click();};
  };
  img.src=URL.createObjectURL(currentFile);
});
</script>
</body>
</html>
