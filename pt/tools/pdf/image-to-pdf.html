<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagen a PDF Grátis | FilePristo</title>
<meta name="description" content="Converta JPG PNG WebP a PDF gratuitamente.">

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--p:#DC2626;--pd:#B91C1C;--pl:#FEE2E2;--t:#1a1a2e;--tl:#6c757d;--bg:#f8f9fa;--w:#fff;--b:#dee2e6}body{font-family:system-ui,sans-serif;color:var(--t);background:var(--bg)}a{color:inherit;text-decoration:none}nav{background:var(--w);border-bottom:1px solid var(--b);padding:0 24px;position:sticky;top:0;z-index:100}.n{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}.logo{font-size:1.4rem;font-weight:800;color:var(--p)}.logo span{color:var(--t)}.nl{display:flex;gap:24px;font-size:.9rem}.ls{display:flex;gap:6px;font-size:.8rem}.ls a{padding:3px 8px;border-radius:4px;border:1px solid var(--b);color:var(--tl)}.ls a.active{background:var(--p);color:#fff}.h{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;text-align:center;padding:48px 24px}.h h1{font-size:2rem;font-weight:800;margin-bottom:8px}.h h1 em{color:#fca5a5;font-style:normal}.h p{opacity:.9;max-width:480px;margin:0 auto}.cs{max-width:680px;margin:0 auto;padding:32px 24px}.bx{background:var(--w);border-radius:12px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}.up{border:2px dashed var(--b);border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px}.up:hover{border-color:var(--p);background:var(--pl)}.ic{font-size:2rem;margin-bottom:6px}.up h3{font-size:.95rem;font-weight:600;margin-bottom:4px}.up p{color:var(--tl);font-size:.82rem}input[type=file]{display:none}.fd{background:var(--bg);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:.82rem;display:none}.fd strong{color:var(--p)}.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:6px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;width:100%;justify-content:center}.gn{background:var(--p);color:#fff}.gn:disabled{opacity:.6;cursor:not-allowed}.pw{display:none;margin-bottom:12px}.br{background:var(--b);border-radius:999px;height:6px;overflow:hidden}.bf{background:var(--p);height:100%;width:0%;transition:.3s}.sm{font-size:.82rem;color:var(--tl);margin-top:4px;text-align:center}.db{display:none;background:var(--pd);color:#fff;margin-top:8px}.cards{max-width:960px;margin:20px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.card{background:var(--w);border-radius:8px;padding:16px}.ci{font-size:1.6rem;margin-bottom:6px}.card h3{font-size:.85rem;font-weight:700;margin-bottom:2px}.card p{color:var(--tl);font-size:.78rem}footer{text-align:center;padding:16px;color:var(--tl);font-size:.75rem}</style>
</head>
<body>
<nav><div class="n"><a href="../../index.html" class="logo">File<span>Pristo</span></a><div class="nl"><a href="index.html" style="color:var(--p)">PDF</a></div><div class="ls"><a href="../../../tools/pdf/image-to-pdf.html">EN</a><a href="image-to-pdf.html">ES</a><a href="../../../pt/tools/pdf/image-to-pdf.html" class="active">PT</a></div></div></nav>
<section class="h"><h1>Imagen a <em>PDF</em></h1><p>Converta JPG, PNG, WebP a PDF. Multiple imagemes permitidas.</p></section>
<section class="cs"><div class="bx"><div class="up" id="u"><div class="ic">&#x1F5BC;</div><h3>Selecciona tus imagemes</h3><p>JPG PNG WebP</p><input type="file" id="f" accept="image/jpeg,image/png,image/webp" multiple></div><div class="fd" id="fd">Imagenes: <strong id="fn"></strong></div><button class="btn gn" id="b" disabled>Crear PDF</button><div class="pw" id="pw"><div class="br"><div class="bf" id="bf"></div></div><p class="sm" id="sm">Preparando...</p></div><a class="btn db" id="d" download="fotos.pdf">&#x2B07; Baixar PDF</a></div></section>
<div class="cards"><div class="card"><div class="ci">&#x1F512;</div><h3>Privado</h3><p>Solo local.</p></div><div class="card"><div class="ci">&#x1F5BC;</div><h3>Multiple</h3><p>Varios formatos.</p></div><div class="card"><div class="ci">&#x1F4C4;</div><h3>PDF</h3><p>Alta qualidade.</p></div><div class="card"><div class="ci">&#x1F193;</div><h3>Grátis</h3><p>Siempre.</p></div></div>
<footer>2026 FilePristo</footer>
<script>
const {PDFDocument}=PDFLib,u=document.getElementById('u'),f=document.getElementById('f'),fd=document.getElementById('fd'),fn=document.getElementById('fn'),b=document.getElementById('b'),pw=document.getElementById('pw'),bf=document.getElementById('bf'),sm=document.getElementById('sm'),d=document.getElementById('d');
let files=[];
u.onclick=()=>f.click();u.ondragover=e=>e.preventDefault();u.ondrop=e=>{e.preventDefault();go(Array.from(e.dataTransfer.files||[]));};f.onchange=()=>go(Array.from(f.files||[]));
function go(a){files=a.filter(x=>x.type.startsWith('image/'));fn.textContent=files.length+' img';fd.style.display='block';b.disabled=!files.length;d.style.display='none';}
b.onclick=async()=>{b.disabled=true;pw.style.display='block';try{const doc=await PDFDocument.create();for(let i=0;i<files.length;i++){sm.textContent=(i+1)+'/'+files.length;bf.style.width=Math.round(i/files.length*90+5)+'%';const ab=await files[i].arrayBuffer();const img=files[i].type.includes('png')?await doc.embedPng(ab):await doc.embedJpg(ab);const pg=doc.addPage([img.width,img.height]);pg.drawImage(img,{x:0,y:0,width:img.width,height:img.height});}const bytes=await doc.save();d.href=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));d.style.display='flex';bf.style.width='100%';sm.textContent='Listo!';}catch(e){sm.textContent='Error';}b.disabled=false;};
</script>
